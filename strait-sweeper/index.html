<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Strait Sweeper — Ektak Games</title>
<link rel="icon" href="../Ektak-Icon.ico" type="image/x-icon">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --cols: 36;
  --rows: 28;
  --win-gray: #c0c0c0;
  --hi:  #ffffff;
  --mid: #808080;
  --lo:  #404040;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: #0a1228;
  color: #dce6f7;
  font-family: 'Nunito', system-ui, sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

.wrap {
  max-width: 1220px;
  margin: 0 auto;
  padding: 20px 22px 36px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
}

/* BACK NAV */
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: #8fa8cc;
  text-decoration: none;
  margin-bottom: 12px;
  transition: color 0.18s ease;
}
.back-link::before { content: '←'; font-size: 16px; }
.back-link:hover { color: #4a9fd4; }

/* GAME LOGO */
.logo {
  display: block;
  max-width: 260px;
  width: 100%;
  height: auto;
  margin: 0 0 14px -6px;
  filter: drop-shadow(0 4px 20px rgba(0,0,0,0.7));
}

/* ═══════════════════════════════════════════════
   CLASSIC WINDOWS CHROME
═══════════════════════════════════════════════ */

/* Outer window — the heavy raised border */
.game-window {
  background: var(--win-gray);
  /* thick raised bevel */
  border-top:    3px solid var(--hi);
  border-left:   3px solid var(--hi);
  border-bottom: 3px solid var(--lo);
  border-right:  3px solid var(--lo);
  box-shadow: inset -1px -1px 0 var(--mid), inset 1px 1px 0 #e0e0e0;
  padding: 6px;
  display: inline-flex;
  flex-direction: column;
  gap: 6px;
  align-self: flex-start;
  width: min(1172px, 96vw);
}

/* ── HUD PANEL ─────────────────────────────── */
.hud-panel {
  /* sunken inset inside the window */
  border-top:    2px solid var(--mid);
  border-left:   2px solid var(--mid);
  border-bottom: 2px solid var(--hi);
  border-right:  2px solid var(--hi);
  box-shadow: inset 1px 1px 0 var(--lo);
  background: var(--win-gray);
  padding: 6px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* LED displays — mine counter & timer */
.led {
  font-family: 'Share Tech Mono', monospace;
  font-size: 32px;
  line-height: 1;
  color: #ff0000;
  background: #000;
  padding: 4px 8px 2px;
  min-width: 68px;
  text-align: right;
  letter-spacing: 3px;
  /* sunken */
  border-top:    2px solid var(--mid);
  border-left:   2px solid var(--mid);
  border-bottom: 2px solid var(--hi);
  border-right:  2px solid var(--hi);
  user-select: none;
}

/* Smiley face reset button */
.smiley-btn {
  font-size: 22px;
  line-height: 1;
  background: var(--win-gray);
  cursor: pointer;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  /* raised */
  border-top:    3px solid var(--hi);
  border-left:   3px solid var(--hi);
  border-bottom: 3px solid var(--lo);
  border-right:  3px solid var(--lo);
  box-shadow: inset -1px -1px 0 var(--mid), inset 1px 1px 0 #e8e8e8;
  transition: none;
}
.smiley-btn:active {
  border-top:    3px solid var(--lo);
  border-left:   3px solid var(--lo);
  border-bottom: 3px solid var(--hi);
  border-right:  3px solid var(--hi);
  box-shadow: inset 1px 1px 0 var(--mid);
}

/* ── BOARD WRAPPER ─────────────────────────── */
.board-wrapper {
  /* sunken border around the board */
  border-top:    3px solid var(--mid);
  border-left:   3px solid var(--mid);
  border-bottom: 3px solid var(--hi);
  border-right:  3px solid var(--hi);
  box-shadow: inset 1px 1px 0 var(--lo);
  line-height: 0;
  overflow: hidden;
}

/* ── BOARD ─────────────────────────────────── */
.board-container {
  position: relative;
  display: inline-block;
  user-select: none;
  width: 100%;
  aspect-ratio: 2320 / 1860;
}

.board-img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: fill;
  pointer-events: none;
}

.grid {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: grid;
  grid-template-columns: repeat(var(--cols), 1fr);
  grid-template-rows: repeat(var(--rows), 1fr);
}

/* ── CELLS ─────────────────────────────────── */
.cell {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Share Tech Mono', monospace;
  font-size: clamp(9px, 1.15vw, 14px);
  font-weight: 700;
  cursor: pointer;
  line-height: 1;
  user-select: none;
}

/* Land — fully transparent, no interaction */
.cell.land { cursor: default; }

/* Hidden water tile — classic raised gray square */
.cell.water.hidden {
  background: var(--win-gray);
  border-top:    2px solid var(--hi);
  border-left:   2px solid var(--hi);
  border-bottom: 2px solid var(--lo);
  border-right:  2px solid var(--lo);
}
.cell.water.hidden:hover {
  background: #cacaca;
}

/* Revealed water tile — transparent so satellite shows through */
.cell.water.revealed {
  background: rgba(192, 192, 192, 0.18);
  border: 1px solid rgba(128,128,128,0.25);
}

/* Revealed with number — slight backing for readability */
.cell.water.revealed.has-num {
  background: rgba(200, 200, 200, 0.55);
}

/* Flagged tile — still raised, shows flag */
.cell.water.flagged {
  background: var(--win-gray);
  border-top:    2px solid var(--hi);
  border-left:   2px solid var(--hi);
  border-bottom: 2px solid var(--lo);
  border-right:  2px solid var(--lo);
}

/* Mine states */
.cell.water.mine-blast {
  background: rgba(220, 30, 30, 0.85);
  border: 1px solid rgba(200,0,0,0.4);
}
.cell.water.mine-shown {
  background: rgba(192, 192, 192, 0.55);
  border: 1px solid rgba(128,128,128,0.3);
}

/* ── NUMBER COLORS (classic minesweeper) ───── */
.n1 { color: #0000ff; }
.n2 { color: #007b00; }
.n3 { color: #ff0000; }
.n4 { color: #00007b; }
.n5 { color: #7b0000; }
.n6 { color: #007b7b; }
.n7 { color: #000000; }
.n8 { color: #7b7b7b; }

/* Mine & flag glyphs */
.mine-glyph { color: #000; font-size: 0.85em; }
.flag-glyph { color: #cc0000; font-size: 0.85em; }
.wrong-flag { color: #cc0000; font-size: 0.85em; }

/* ── FOOTER ─────────────────────────────────── */
.footer {
  margin-top: 12px;
  font-family: 'Nunito', sans-serif;
  font-weight: 600;
  color: #8fa8cc;
  font-size: 13px;
  max-width: 720px;
  line-height: 1.6;
}

@media (max-width: 600px) {
  .wrap { padding: 14px 10px 36px; }
  .led { font-size: 24px; min-width: 52px; }
  .smiley-btn { width: 32px; height: 32px; font-size: 18px; }
}
</style>
</head>
<body>
<div class="wrap">
  <a href="../" class="back-link">Ektak Games</a>
  <img src="logo.png" alt="Strait Sweeper" class="logo">

  <div class="game-window">

    <!-- Classic HUD: mine counter | smiley | timer -->
    <div class="hud-panel">
      <div class="led" id="mine-count">076</div>
      <button class="smiley-btn" id="reset" title="New Game">🙂</button>
      <div class="led" id="timer">000</div>
    </div>

    <!-- Board -->
    <div class="board-wrapper">
      <div class="board-container" id="board-container">
        <img class="board-img" id="board-img" src="Strait_of_Hormuz_and_Musandam_Peninsula_(MODIS_2018-12-10).jpg" alt="Strait of Hormuz satellite image">
        <div class="grid" id="grid"></div>
      </div>
    </div>

  </div>

  <div class="footer">
    Left-click to reveal &nbsp;·&nbsp; Right-click or long-press to flag &nbsp;·&nbsp; Land is inert — only the Persian Gulf, the Strait, and the Gulf of Oman are in play. Clear every water cell to win.
  </div>
</div>

<script>
  // Water mask: 1 = water (playable), 0 = land (inert). 36 cols x 28 rows.
  const COLS = 36;
  const ROWS = 28;
  const MASK_STR =
    "000000000000000000000000000000000000" +
    "000000000000000000000000000000000000" +
    "000000000000000000000000000000000000" +
    "000000000000000000011110000000000000" +
    "000000000000000001011111000000000000" +
    "000000000000000100011111100000000000" +
    "111111000000110011111111100000000000" +
    "111111110011111111111111100000000000" +
    "111111111111111111111111100000000000" +
    "111111111111111111110111110000000000" +
    "111111111111111111100111110000000000" +
    "111111111111111111000111111000000000" +
    "111111111111111110001111111000000000" +
    "111111111111111100001111111111110000" +
    "111111111111110000001111111111111111" +
    "111111111111100000001111111111111111" +
    "111111111111000000001111111111111111" +
    "111111111111000000001111111111111111" +
    "111111111100000000000111111111111111" +
    "111111111000000000000111111111111111" +
    "111111110000000000000011111111111111" +
    "111111000000000000000011111111111111" +
    "111110000000000000000001111111111111" +
    "110100000000000000000000111111111111" +
    "000000000000000000000000011111111111" +
    "000000000000000000000000000111111111" +
    "000000000000000000000000000000111111" +
    "000000000000000000000000000000000000";

  const MINE_RATIO = 0.16;
  const gridEl = document.getElementById('grid');
  const mineCountEl = document.getElementById('mine-count');
  const timerEl = document.getElementById('timer');
  const resetBtn = document.getElementById('reset');

  document.documentElement.style.setProperty('--cols', COLS);
  document.documentElement.style.setProperty('--rows', ROWS);

  let cells = [];
  let cellEls = [];
  let firstMove = true;
  let gameOver = false;
  let won = false;
  let flagCount = 0;
  let revealedCount = 0;
  let totalWater = 0;
  let totalMines = 0;
  let timer = 0;
  let timerInterval = null;

  function fmtMines(n) { return String(Math.max(-99, Math.min(999, n))).padStart(3, '0'); }
  function fmtTimer(n) { return String(Math.min(999, n)).padStart(3, '0'); }

  function idx(r, c) { return r * COLS + c; }
  function isWater(r, c) {
    if (r < 0 || c < 0 || r >= ROWS || c >= COLS) return false;
    return MASK_STR[idx(r, c)] === '1';
  }

  function neighbors(r, c) {
    const out = [];
    for (let dr = -1; dr <= 1; dr++) {
      for (let dc = -1; dc <= 1; dc++) {
        if (dr === 0 && dc === 0) continue;
        const nr = r + dr, nc = c + dc;
        if (nr >= 0 && nc >= 0 && nr < ROWS && nc < COLS && isWater(nr, nc)) {
          out.push([nr, nc]);
        }
      }
    }
    return out;
  }

  function buildBoard() {
    gridEl.innerHTML = '';
    cells = [];
    cellEls = [];
    totalWater = 0;

    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const water = isWater(r, c);
        const el = document.createElement('div');
        el.className = 'cell ' + (water ? 'water hidden' : 'land');
        if (water) {
          totalWater++;
          el.addEventListener('click', (e) => { e.preventDefault(); onReveal(r, c); });
          el.addEventListener('contextmenu', (e) => { e.preventDefault(); onFlag(r, c); });
          let pressTimer = null;
          el.addEventListener('touchstart', (e) => {
            pressTimer = setTimeout(() => { onFlag(r, c); pressTimer = null; }, 450);
          }, { passive: true });
          el.addEventListener('touchend', () => {
            if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
          });
          el.addEventListener('touchmove', () => {
            if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
          });
        }
        gridEl.appendChild(el);
        cellEls.push(el);
        cells.push({ r, c, water, mine: false, revealed: false, flagged: false, adj: 0 });
      }
    }

    totalMines = Math.max(1, Math.round(totalWater * MINE_RATIO));
    flagCount = 0;
    revealedCount = 0;
    firstMove = true;
    gameOver = false;
    won = false;
    timer = 0;
    mineCountEl.textContent = fmtMines(totalMines);
    timerEl.textContent = fmtTimer(0);
    resetBtn.textContent = '🙂';
    stopTimer();
  }

  function placeMines(safeR, safeC) {
    const safe = new Set();
    safe.add(idx(safeR, safeC));
    for (const [nr, nc] of neighbors(safeR, safeC)) safe.add(idx(nr, nc));

    const waterIndices = [];
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (isWater(r, c) && !safe.has(idx(r, c))) waterIndices.push(idx(r, c));
      }
    }

    for (let i = waterIndices.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [waterIndices[i], waterIndices[j]] = [waterIndices[j], waterIndices[i]];
    }

    const mineCount = Math.min(totalMines, waterIndices.length);
    totalMines = mineCount;
    mineCountEl.textContent = fmtMines(totalMines - flagCount);

    for (let i = 0; i < mineCount; i++) cells[waterIndices[i]].mine = true;

    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (!isWater(r, c)) continue;
        let n = 0;
        for (const [nr, nc] of neighbors(r, c)) { if (cells[idx(nr, nc)].mine) n++; }
        cells[idx(r, c)].adj = n;
      }
    }
  }

  function startTimer() {
    if (timerInterval) return;
    timerInterval = setInterval(() => {
      timer++;
      timerEl.textContent = fmtTimer(timer);
    }, 1000);
  }
  function stopTimer() {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  }

  function onReveal(r, c) {
    if (gameOver) return;
    const cell = cells[idx(r, c)];
    if (!cell.water || cell.revealed || cell.flagged) return;
    if (firstMove) { placeMines(r, c); firstMove = false; startTimer(); }
    if (cell.mine) { cell.revealed = true; revealAllMines(r, c); endGame(false); return; }
    floodReveal(r, c);
    if (revealedCount === totalWater - totalMines) endGame(true);
  }

  function floodReveal(r, c) {
    const stack = [[r, c]];
    while (stack.length) {
      const [cr, cc] = stack.pop();
      const cell = cells[idx(cr, cc)];
      if (!cell.water || cell.revealed || cell.flagged || cell.mine) continue;
      cell.revealed = true;
      revealedCount++;
      paintCell(cr, cc);
      if (cell.adj === 0) for (const [nr, nc] of neighbors(cr, cc)) stack.push([nr, nc]);
    }
  }

  function paintCell(r, c) {
    const cell = cells[idx(r, c)];
    const el = cellEls[idx(r, c)];
    el.className = 'cell ' + (cell.water ? 'water' : 'land');
    el.textContent = '';
    el.style.color = '';

    if (!cell.water) return;

    if (cell.revealed) {
      el.classList.add('revealed');
      if (cell.mine) {
        const span = document.createElement('span');
        span.className = 'mine-glyph';
        span.textContent = '💣';
        el.appendChild(span);
      } else if (cell.adj > 0) {
        el.classList.add('has-num');
        el.classList.add('n' + cell.adj);
        el.textContent = cell.adj;
      }
    } else if (cell.flagged) {
      el.classList.add('flagged');
      const span = document.createElement('span');
      span.className = 'flag-glyph';
      span.textContent = '🚩';
      el.appendChild(span);
    } else {
      el.classList.add('hidden');
    }
  }

  function onFlag(r, c) {
    if (gameOver) return;
    const cell = cells[idx(r, c)];
    if (!cell.water || cell.revealed) return;
    cell.flagged = !cell.flagged;
    flagCount += cell.flagged ? 1 : -1;
    mineCountEl.textContent = fmtMines(totalMines - flagCount);
    paintCell(r, c);
  }

  function revealAllMines(blastR, blastC) {
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const cell = cells[idx(r, c)];
        if (!cell.water) continue;
        if (cell.mine && !cell.flagged) {
          cell.revealed = true;
          paintCell(r, c);
          const el = cellEls[idx(r, c)];
          el.classList.add(r === blastR && c === blastC ? 'mine-blast' : 'mine-shown');
        } else if (!cell.mine && cell.flagged) {
          const el = cellEls[idx(r, c)];
          el.innerHTML = '';
          const span = document.createElement('span');
          span.className = 'wrong-flag';
          span.textContent = '❌';
          el.appendChild(span);
        }
      }
    }
  }

  function endGame(didWin) {
    gameOver = true;
    won = didWin;
    stopTimer();
    if (didWin) {
      resetBtn.textContent = '😎';
      for (let i = 0; i < cells.length; i++) {
        const cell = cells[i];
        if (cell.water && cell.mine && !cell.flagged) {
          cell.flagged = true; flagCount++; paintCell(cell.r, cell.c);
        }
      }
      mineCountEl.textContent = fmtMines(0);
    } else {
      resetBtn.textContent = '😵';
    }
  }

  resetBtn.addEventListener('click', buildBoard);
  document.getElementById('board-container').addEventListener('contextmenu', (e) => e.preventDefault());
  buildBoard();
</script>
</body>
</html>
